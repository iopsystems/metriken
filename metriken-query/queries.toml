[[query]]
id = "counter_ratio"
mode = "shadow"
promql = "sum(irate(cpu_usage{state=\"user\"}[5m])) / sum(irate(cpu_usage[5m]))"
fixture = "counter_multi_label"
start = 1.0
end = 10.0
step = 1.0
description = "Counter ratio shape (e.g. user-fraction-of-total)."
sql = """
WITH per_series AS (
    SELECT timestamp, id, state,
           CASE
               WHEN LAG(value) OVER w IS NULL THEN NULL
               WHEN value >= LAG(value) OVER w
                   THEN CAST(value - LAG(value) OVER w AS DOUBLE)
               ELSE CAST(value AS DOUBLE)
           END AS rate
    FROM cpu_usage
    WINDOW w AS (PARTITION BY col ORDER BY timestamp)
),
sums AS (
    SELECT timestamp,
           SUM(CASE WHEN state = 'user' THEN rate ELSE 0 END) AS user_rate,
           SUM(rate) AS total_rate
    FROM per_series
    WHERE rate IS NOT NULL
    GROUP BY timestamp
)
SELECT CAST(timestamp AS DOUBLE) / 1e9 AS t,
       user_rate / NULLIF(total_rate, 0) AS v
FROM sums
ORDER BY timestamp
"""
value_columns = ["v"]
label_columns = []
output_metric = {}

# ---------- Histograms ----------

[[query]]
id = "histogram_quantile_generic"
mode = "shadow"
# Fully templated `histogram_quantile(q, m)` — captures both the quantile
# literal and the metric name. ONE entry covers every (q, m) combination.
# The SQL interpolates `{m}` into the FROM clause (referencing the
# auto-generated wide-to-long view for that metric) and `{q}` as a numeric
# literal. The series is tagged with both labels so the canonical output
# matches PromQL's shape.
#
# Replaces the per-metric entries that previously needed one entry per
# (metric, quantile) pair. Real Rezolus traffic (e.g.
# `histogram_quantile(0.99, scheduler_runqueue_latency)`) hits this entry
# directly without a per-metric catalogue change.
#
# Bucket aggregation: metriken-query's `histogram_quantile` semantics sum
# bucket arrays across ALL matching series (e.g. syscall_latency has one
# series per `op` label — they're combined into a single histogram before
# the quantile is computed). The CTE uses `h2_combine(list(buckets))` to
# do this per timestamp; for single-series metrics like
# scheduler_runqueue_latency it's a no-op.
promql = "histogram_quantile(${q:number}, ${m:ident})"
fixture = "histogram_basic"
start = 1.0
end = 10.0
step = 1.0
description = "Generic single-quantile extraction over any histogram view. One templated entry covers every (quantile, metric)."
sql = """
WITH per_ts AS (
    SELECT timestamp,
           h2_combine(list(buckets)) AS buckets,
           ANY_VALUE(p) AS p
    FROM {m}
    GROUP BY timestamp
)
SELECT CAST(timestamp AS DOUBLE) / 1e9 AS t,
       CAST(hist_irate_quantile(buckets, {q}, timestamp, p) AS DOUBLE) AS v
FROM per_ts
ORDER BY timestamp
"""
value_columns = ["v"]
label_columns = []
output_metric = { __name__ = "{m}", quantile = "{q}" }
examples = [
    { id_suffix = "request_latency_p50", query = "histogram_quantile(0.5, request_latency)" },
    { id_suffix = "request_latency_p99", query = "histogram_quantile(0.99, request_latency)" },
]

[[query]]
id = "histogram_quantiles_rezolus_ext"
mode = "shadow"
promql = "histogram_quantiles([0.5, 0.9, 0.99], request_latency)"
fixture = "histogram_basic"
start = 1.0
end = 10.0
step = 1.0
description = "Rezolus extension — multi-quantile in a single walk."
# Use `h2_quantiles` to compute all three quantiles in a single walk
# (the rezolus extension; matches metriken-query's `histogram_quantiles`).
# The list output is array-indexed via CROSS JOIN to produce one row per
# `(timestamp, quantile)`.
sql = """
WITH walked AS (
    SELECT timestamp,
           h2_quantiles(
               h2_delta(buckets, LAG(buckets) OVER (ORDER BY timestamp)),
               [0.5, 0.9, 0.99]::DOUBLE[],
               p
           ) AS qs
    FROM request_latency
)
SELECT CAST(timestamp AS DOUBLE) / 1e9 AS t,
       CAST(qs[q.idx] AS DOUBLE) AS v,
       q.label AS quantile
FROM walked
CROSS JOIN (VALUES (1, '0.5'), (2, '0.9'), (3, '0.99')) AS q(idx, label)
ORDER BY quantile, t
"""
value_columns = ["v"]
label_columns = ["quantile"]
output_metric = { __name__ = "request_latency" }

[[query]]
id = "histogram_heatmap_generic"
mode = "shadow"
# Templated `histogram_heatmap(${m:ident})` — captures the metric name. ONE
# entry covers every histogram metric (request_latency,
# scheduler_runqueue_latency, syscall_latency, vllm_e2e_request_latency, …).
# Same `h2_combine(list(buckets))` GROUP BY pattern as
# `histogram_quantile_generic` so multi-series histograms (e.g.
# syscall_latency, with one column per `op` label) get aggregated across
# series before the per-tick delta is taken. Self-join sidesteps the
# `LAG(buckets) OVER (ORDER BY timestamp)` chunk-boundary issue across
# multi-row-group parquet files.
promql = "histogram_heatmap(${m:ident})"
output_shape = "heatmap"
fixture = "histogram_basic"
start = 1.0
end = 10.0
step = 1.0
description = "Rezolus extension — 2-D heatmap output for visualization. One templated entry covers every histogram metric."
# UNNEST WITH ORDINALITY emits one row per non-zero bucket per tick. The
# backend reconstructs timestamps, bucket_bounds (via h2_upper for the
# contiguous index range), and remaps bucket_idx into the output frame.
sql = """
WITH per_ts AS (
    SELECT timestamp,
           h2_combine(list(buckets)) AS buckets,
           ANY_VALUE(p) AS p
    FROM {m}
    GROUP BY timestamp
),
paired AS (
    SELECT a.timestamp,
           h2_delta(a.buckets,
                    LAG(a.buckets) OVER (ORDER BY a.timestamp)) AS d,
           a.p
    FROM per_ts a
)
SELECT CAST(timestamp AS DOUBLE) / 1e9 AS t,
       (u.ordinal - 1)::INTEGER AS bucket_idx,
       u.value::DOUBLE AS count,
       p::INTEGER AS p
FROM paired
CROSS JOIN UNNEST(d) WITH ORDINALITY AS u(value, ordinal)
WHERE u.value > 0
ORDER BY t, bucket_idx
"""
examples = [
    { id_suffix = "request_latency", query = "histogram_heatmap(request_latency)" },
]

[[query]]
id = "histogram_quantile_with_reset"
mode = "shadow"
promql = "histogram_quantile(0.5, request_latency)"
fixture = "histogram_reset"
start = 1.0
end = 4.0
step = 1.0
description = "Quantile across a histogram-reset boundary (delta_to_32_or_empty path)."
# h2_delta is element-wise saturating sub: when the cumulative drops, every
# bucket goes to 0 → empty histogram → h2_quantile returns NULL. Same
# observable behaviour as PromQL's `delta_to_32_or_empty` empty-fallback,
# so the timestamp at the reset is dropped from the output.
sql = """
SELECT t, v FROM (
    SELECT CAST(timestamp AS DOUBLE) / 1e9 AS t,
           CAST(hist_irate_quantile(buckets, 0.5, timestamp, p) AS DOUBLE) AS v
    FROM request_latency
)
WHERE v IS NOT NULL
ORDER BY t
"""
value_columns = ["v"]
label_columns = []
output_metric = { __name__ = "request_latency", quantile = "0.5" }

