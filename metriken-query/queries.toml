[[query]]
id = "gauge_avg_over_time"
mode = "shadow"
promql = "avg_over_time(queue_depth[5m])"
fixture = "gauge_basic"
start = 0.0
end = 10.0
step = 1.0
description = "Time-aggregation function family — windowed mean of a gauge."
# 1Hz sampling → 300 rows ≈ 5 minutes. ROWS BETWEEN avoids the RANGE
# unit-mismatch problem (timestamps are ns, the [5m] window is seconds).
sql = """
SELECT CAST(timestamp AS DOUBLE) / 1e9,
       AVG(CAST(queue_depth AS DOUBLE)) OVER (
         ORDER BY timestamp
         ROWS BETWEEN 300 PRECEDING AND CURRENT ROW
       )
FROM read_parquet('{fixture_path}')
WHERE queue_depth IS NOT NULL
ORDER BY timestamp
"""
value_columns = ["v"]
label_columns = []
output_metric = { __name__ = "queue_depth" }

# ---------- Counters ----------

[[query]]
id = "counter_irate_basic"
mode = "shadow"
promql = "irate(requests[5m])"
fixture = "counter_basic"
start = 1.0
end = 10.0
step = 1.0
description = "Baseline irate — instantaneous rate from the last two samples in the window."
# `irate_1s` is `c - LAG(c) OVER (...)`. The first row produces NULL (no LAG)
# which the WHERE clause filters, matching PromQL's `start = 1.0` (skipping t=0).
sql = """
SELECT CAST(timestamp AS DOUBLE) / 1e9,
       CAST(irate_1s(requests, timestamp) AS DOUBLE) AS v
FROM read_parquet('{fixture_path}')
QUALIFY v IS NOT NULL
ORDER BY timestamp
"""
value_columns = ["v"]
label_columns = []
output_metric = { __name__ = "requests" }

[[query]]
id = "counter_rate_basic"
mode = "shadow"
promql = "rate(requests[5m])"
fixture = "counter_basic"
start = 1.0
end = 10.0
step = 1.0
description = "Baseline rate — average over the window."
# Windowed monotonic rate: (current - first_in_window) / span_in_seconds.
# Correct for monotonic counters; for reset-prone counters use the
# CTE pattern in `counter_rate_reset`.
sql = """
SELECT CAST(timestamp AS DOUBLE) / 1e9 AS t,
       (CAST(requests AS DOUBLE) - FIRST_VALUE(CAST(requests AS DOUBLE)) OVER w)
       / NULLIF(
           CAST(timestamp - FIRST_VALUE(timestamp) OVER w AS DOUBLE) / 1e9,
           0
       ) AS v
FROM read_parquet('{fixture_path}')
WHERE requests IS NOT NULL
WINDOW w AS (ORDER BY timestamp ROWS BETWEEN 300 PRECEDING AND CURRENT ROW)
QUALIFY v IS NOT NULL
ORDER BY t
"""
value_columns = ["v"]
label_columns = []
output_metric = { __name__ = "requests" }

[[query]]
id = "counter_irate_reset"
mode = "shadow"
promql = "irate(requests[5m])"
fixture = "counter_reset"
start = 1001.0
end = 1004.0
step = 1.0
description = "irate over a counter that resets at t=1003 — exercises reset semantics."
# `irate_1s` is now reset-aware (post-reset value as the increment).
sql = """
SELECT CAST(timestamp AS DOUBLE) / 1e9 AS t,
       irate_1s(requests, timestamp) AS v
FROM read_parquet('{fixture_path}')
WHERE requests IS NOT NULL
QUALIFY v IS NOT NULL
ORDER BY t
"""
value_columns = ["v"]
label_columns = []
output_metric = { __name__ = "requests" }

[[query]]
id = "counter_rate_reset"
mode = "shadow"
promql = "rate(requests[5m])"
fixture = "counter_reset"
start = 1001.0
end = 1004.0
step = 1.0
description = "rate over a counter that resets at t=1003 (post-reset value as increase)."
# Reset-aware rate: per-pair PromQL increments computed in a CTE (so the
# `LAG` isn't nested under another window function), then summed and
# normalised over a 5-minute row window. Equivalent to PromQL's reset-aware
# `rate()` semantics from `streaming/rate.rs:60-68`.
sql = """
WITH incr AS (
    SELECT timestamp,
           CASE
               WHEN LAG(requests) OVER (ORDER BY timestamp) IS NULL THEN NULL
               WHEN requests >= LAG(requests) OVER (ORDER BY timestamp)
                   THEN CAST(requests - LAG(requests) OVER (ORDER BY timestamp) AS DOUBLE)
               ELSE CAST(requests AS DOUBLE)
           END AS inc
    FROM read_parquet('{fixture_path}')
    WHERE requests IS NOT NULL
)
SELECT CAST(timestamp AS DOUBLE) / 1e9 AS t,
       SUM(inc) OVER w
       / NULLIF(
           CAST(timestamp - FIRST_VALUE(timestamp) OVER w AS DOUBLE) / 1e9,
           0
       ) AS v
FROM incr
WINDOW w AS (ORDER BY timestamp ROWS BETWEEN 300 PRECEDING AND CURRENT ROW)
QUALIFY v IS NOT NULL
ORDER BY t
"""
value_columns = ["v"]
label_columns = []
output_metric = { __name__ = "requests" }

[[query]]
id = "counter_sum_by_id"
mode = "shadow"
promql = "sum by (id) (irate(cpu_usage[5m]))"
fixture = "counter_multi_label"
start = 1.0
end = 10.0
step = 1.0
description = "Sum aggregation grouped by label — Rezolus per-CPU dashboard pattern."
# Uses the auto-generated `cpu_usage(timestamp, value, id, state)` view.
# Per-series irate is computed with `PARTITION BY id, state` so LAG only
# walks within a single labeled series.
sql = """
WITH per_series AS (
    SELECT timestamp, id, state,
           CASE
               WHEN LAG(value) OVER w IS NULL THEN NULL
               WHEN value >= LAG(value) OVER w
                   THEN CAST(value - LAG(value) OVER w AS DOUBLE)
               ELSE CAST(value AS DOUBLE)
           END AS rate
    FROM cpu_usage
    WINDOW w AS (PARTITION BY id, state ORDER BY timestamp)
)
SELECT CAST(timestamp AS DOUBLE) / 1e9 AS t,
       SUM(rate) AS v,
       id
FROM per_series
WHERE rate IS NOT NULL
GROUP BY id, timestamp
ORDER BY id, timestamp
"""
value_columns = ["v"]
label_columns = ["id"]
# `sum by (id)` drops `__name__` (PromQL aggregation rule).
output_metric = {}

