# GPU dashboards mostly read gauges with a scalar divisor. Two shapes:
# `sum(${m:ident}) / ${d:number}` and `avg(${m:ident}) / ${d:number}`.
# A third for `rate(${m:ident}[5m])` (gpu_energy_consumption is a counter).

