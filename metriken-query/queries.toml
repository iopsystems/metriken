# ---------- Templated entries ----------
# Templated entries use `${name:kind}` placeholders in `promql` and matching
# `{name}` interpolations in `sql`. The matcher extracts captures from
# incoming queries; the SQL backend substitutes them. Each entry's `examples`
# array drives the golden harness — one snapshot per concrete instantiation,
# named `{entry.id}_{example.id_suffix}`. See `metriken-query/src/template.rs`
# for the placeholder grammar and `metriken-query-sql/src/interp.rs` for the
# interpolation rules.

[[query]]
id = "softirq_irate_total_by_kind"
mode = "shadow"
# Captures one label-value (`kind`) of an `irate(softirq{...})` aggregate.
# The plan covers the four softirq shapes (rate, rate-by-id, time-pct,
# time-pct-by-id) × ten kinds with one entry each — this is the rate one.
promql = 'sum(irate(softirq{kind=${k:string}}[5m]))'
fixture = "softirq_multi_kind"
start = 1.0
end = 10.0
step = 1.0
description = "Softirq rate per kind. One templated entry covers every kind value."
# Note: `{k}` interpolates as a fully SQL-quoted string literal (e.g. `'hi'`)
# — do not wrap it in extra single-quotes.
sql = """
WITH per_series AS (
    SELECT timestamp, id,
           CASE
               WHEN LAG(value) OVER w IS NULL THEN NULL
               WHEN value >= LAG(value) OVER w
                   THEN CAST(value - LAG(value) OVER w AS DOUBLE)
               ELSE CAST(value AS DOUBLE)
           END AS rate
    FROM softirq
    WHERE kind = {k}
    WINDOW w AS (PARTITION BY id ORDER BY timestamp)
)
SELECT CAST(timestamp AS DOUBLE) / 1e9 AS t,
       SUM(rate) AS v
FROM per_series
WHERE rate IS NOT NULL
GROUP BY timestamp
ORDER BY timestamp
"""
value_columns = ["v"]
label_columns = []
output_metric = {}
examples = [
    { id_suffix = "hi", query = 'sum(irate(softirq{kind="hi"}[5m]))' },
    { id_suffix = "net_rx", query = 'sum(irate(softirq{kind="net_rx"}[5m]))' },
    { id_suffix = "timer", query = 'sum(irate(softirq{kind="timer"}[5m]))' },
]

# ---------- Group F: softirq per-kind shape family ----------
#
# Group F has four shapes per kind. We already have `softirq_irate_total_by_kind`
# (rate). Below adds the other three: rate-by-id, time-pct (cores divisor),
# and time-pct-by-id. Each is templated by `${k:string}` so one entry covers
# every softirq kind (hi, net_rx, timer, …).

[[query]]
id = "softirq_irate_by_id_by_kind"
mode = "shadow"
# `sum by (id) (irate(softirq{kind=...}[5m]))` — per-CPU softirq rate.
# Same SQL skeleton as `counter_sum_by_id_filtered` but the filter is on
# `kind` (string capture) instead of `state`.
promql = 'sum by (id) (irate(softirq{kind=${k:string}}[5m]))'
fixture = "softirq_multi_kind"
start = 1.0
end = 10.0
step = 1.0
description = "Per-id softirq rate per kind."
sql = """
WITH per_series AS (
    SELECT timestamp, id,
           CASE
               WHEN LAG(value) OVER w IS NULL THEN NULL
               WHEN value >= LAG(value) OVER w
                   THEN CAST(value - LAG(value) OVER w AS DOUBLE)
               ELSE CAST(value AS DOUBLE)
           END AS rate
    FROM softirq
    WHERE kind = {k}
    WINDOW w AS (PARTITION BY col ORDER BY timestamp)
)
SELECT CAST(timestamp AS DOUBLE) / 1e9 AS t,
       SUM(rate) AS v,
       id
FROM per_series
WHERE rate IS NOT NULL
GROUP BY id, timestamp
ORDER BY id, timestamp
"""
value_columns = ["v"]
label_columns = ["id"]
output_metric = {}
examples = [
    { id_suffix = "hi", query = 'sum by (id) (irate(softirq{kind="hi"}[5m]))' },
    { id_suffix = "net_rx", query = 'sum by (id) (irate(softirq{kind="net_rx"}[5m]))' },
]

[[query]]
id = "softirq_time_pct_by_kind"
mode = "shadow"
# Total softirq CPU time as a fraction of available CPU. The dashboard
# substitutes a numeric `cores` divisor JS-side (e.g. `... / 8 / 1e9`),
# so this entry captures it as `${cores:number}`.
promql = 'sum(irate(softirq_time{kind=${k:string}}[5m])) / ${cores:number} / 1000000000'
fixture = "softirq_multi_kind"
start = 1.0
end = 10.0
step = 1.0
description = "Softirq CPU-time percentage per kind (ns/s summed, divided by cores and 1e9)."
sql = """
WITH per_series AS (
    SELECT timestamp, id,
           CASE
               WHEN LAG(value) OVER w IS NULL THEN NULL
               WHEN value >= LAG(value) OVER w
                   THEN CAST(value - LAG(value) OVER w AS DOUBLE)
               ELSE CAST(value AS DOUBLE)
           END AS rate
    FROM softirq_time
    WHERE kind = {k}
    WINDOW w AS (PARTITION BY col ORDER BY timestamp)
)
SELECT CAST(timestamp AS DOUBLE) / 1e9 AS t,
       SUM(rate) / {cores} / 1000000000 AS v
FROM per_series
WHERE rate IS NOT NULL
GROUP BY timestamp
ORDER BY timestamp
"""
value_columns = ["v"]
label_columns = []
output_metric = {}
examples = [
    { id_suffix = "net_rx", query = 'sum(irate(softirq_time{kind="net_rx"}[5m])) / 2 / 1000000000' },
    { id_suffix = "timer", query = 'sum(irate(softirq_time{kind="timer"}[5m])) / 2 / 1000000000' },
]

