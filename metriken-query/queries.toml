# ---------- Group D: multi-operand counter ratios ----------
#
# Two-counter ratio shape — IPC, branch-miss-rate, etc. The PromQL form is
# `sum(irate(${a:ident}[5m])) / sum(irate(${b:ident}[5m]))`. SQL: compute
# the per-series rate for each operand separately, sum across series per
# tick, then JOIN on timestamp and divide.

[[query]]
id = "counter_ratio_generic"
mode = "shadow"
promql = "sum(irate(${a:ident}[5m])) / sum(irate(${b:ident}[5m]))"
fixture = "rezolus_minimal"
start = 1.0
end = 20.0
step = 1.0
description = "Generic two-counter ratio. Covers IPC (instructions/cycles), branch-miss-rate, etc."
sql = """
WITH a_per_series AS (
    SELECT timestamp,
           CASE
               WHEN LAG(value) OVER w IS NULL THEN NULL
               WHEN value >= LAG(value) OVER w
                   THEN CAST(value - LAG(value) OVER w AS DOUBLE)
               ELSE CAST(value AS DOUBLE)
           END AS rate
    FROM {a}
    WINDOW w AS (PARTITION BY col ORDER BY timestamp)
),
a_sum AS (
    SELECT timestamp, SUM(rate) AS s
    FROM a_per_series WHERE rate IS NOT NULL
    GROUP BY timestamp
),
b_per_series AS (
    SELECT timestamp,
           CASE
               WHEN LAG(value) OVER w IS NULL THEN NULL
               WHEN value >= LAG(value) OVER w
                   THEN CAST(value - LAG(value) OVER w AS DOUBLE)
               ELSE CAST(value AS DOUBLE)
           END AS rate
    FROM {b}
    WINDOW w AS (PARTITION BY col ORDER BY timestamp)
),
b_sum AS (
    SELECT timestamp, SUM(rate) AS s
    FROM b_per_series WHERE rate IS NOT NULL
    GROUP BY timestamp
)
SELECT CAST(a.timestamp AS DOUBLE) / 1e9 AS t,
       a.s / NULLIF(b.s, 0) AS v
FROM a_sum a
JOIN b_sum b ON a.timestamp = b.timestamp
ORDER BY a.timestamp
"""
value_columns = ["v"]
label_columns = []
output_metric = {}
examples = [
    { id_suffix = "bpf_avg_run_time_total", query = "sum(irate(rezolus_bpf_run_time[5m])) / sum(irate(rezolus_bpf_run_count[5m]))" },
