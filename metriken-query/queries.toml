# Canonical query catalogue and migration ledger for the metriken-query →
# DuckDB SQL migration.
#
# This file plays two roles. At test time it drives the golden-snapshot
# harness in `tests/golden.rs` (PromQL queries are run against fixtures and
# their output is checked against checked-in `insta` snapshots). At runtime
# it drives the dispatcher inside `QueryEngine::query_range`: incoming
# PromQL is matched against entries here and routed to PromQL, the SQL
# twin, or both, according to each entry's `mode`.
#
# Schema:
#   id           — unique slug, used as the snapshot file name
#   mode         — off | shadow | strict | primary (lifecycle, see below)
#   promql       — the PromQL query (literal for now; template captures TBD)
#   sql          — the DuckDB SQL twin; absent → mode forced to off
#   value_columns / label_columns — used to project SQL rows back into a
#                  QueryResult::Matrix shape. value_columns are the value
#                  fields per row (typically one); label_columns are the
#                  series-defining label columns (empty → single series).
#   fixture / start / end / step — used by the golden harness only;
#                  ignored by the runtime dispatcher.
#   description  — free text.
#
# `mode` lifecycle:
#   off     — PromQL only. Default for entries without a SQL twin or whose
#             SQL hasn't been validated yet.
#   shadow  — Run both engines on every request; compare; log/metricise
#             diffs; return PromQL's answer.
#   strict  — Run both; compare; diff = hard error; otherwise return either.
#   primary — Run SQL only.
#
# Promotions are catalogue commits — `git log -p queries.toml` is the
# canonical migration history.
#
# ---------- SQL idioms used by templated entries ----------
#
# 1. Per-series rate via `PARTITION BY col`. Every metric view exposes a `col`
#    column carrying the physical parquet column name (one per labeled series),
#    so `LAG(value) OVER (PARTITION BY col ORDER BY timestamp)` walks within
#    a single series — no leakage across labels.
# 2. Multi-series histogram aggregation with `h2_combine(list(buckets))` per
#    timestamp, then `hist_irate_quantile`. Single-series metrics cost the
#    same as without the wrap — `h2_combine` of a 1-element list is a no-op.
# 3. Bare-counter `irate(${m:ident}[5m])` shape: union the per-series rates
#    and SUM. See `counter_total_sum` for the canonical pattern; Group K
#    singletons reuse it verbatim.
# 4. Gauge arithmetic: gauges have no rate, so the SQL is a `SELECT t, expr`
#    where `expr` does the arithmetic on the raw `value` column. For
#    multi-metric arithmetic, JOIN the views on `timestamp`.
# 5. Counter-with-source-label: same as `counter_total_sum` plus a
#    `WHERE source = {s}` (or `WHERE {labels:as_predicate}` for multi-label).
# 6. Per-pair rate normalisation. Each `inc` in the rate-CTE divides by the
#    actual snapped time delta to the previous sample (`(timestamp - LAG(
#    timestamp)) / 1e9`), not by a hard-coded 1-second interval. For uniform
#    1-Hz data this simplifies to `inc`; for parquets with snapshot gaps
#    (combined "AB" recordings, sparse samplers) the delta normalisation
#    matches PromQL's `irate`/`rate` semantics.
#
# Limitation: PromQL evaluates `query_range` at every step (start, start+step,
# …, end) and emits a value per step using "the last 2 samples in [step-W,
# step]". SQL emits one value per data row. When the data has gaps, PromQL's
# step series has more emission points than SQL's row series — the values at
# shared timestamps agree, but the canonical-JSON arrays differ in length.
# Production agent recordings have no gaps so this doesn't bite; combined
# "AB_base"/"AB_level" parquets do, and the `frontend_coverage` test treats
# their divergences as warnings rather than failures.

# ---------- Gauges ----------

[[query]]
id = "gauge_bare"
mode = "shadow"
# Templated bare-gauge selector — `${m:ident}` covers any gauge metric
# (memory_total, memory_available, memory_buffers, memory_cached, …).
# Projects every label column the metric view exposes (e.g. `source` on
# multi-source parquets like cachecannon's `0::memory_total` /
# `rezolus-client::memory_total`) via `* EXCLUDE`. The backend infers label
# names from the prepared-statement schema when `label_columns` is empty,
# so this one entry covers both labelless and labeled gauge shapes.
promql = "${m:ident}"
fixture = "gauge_basic"
start = 0.0
end = 10.0
step = 1.0
description = "Bare gauge selector — no rate function, just emit the points. One templated entry covers every gauge metric."
value_columns = ["v"]
label_columns = []
# Static labels added to every emitted series — mirrors PromQL's implicit
# `__name__` label on bare selectors.
output_metric = { __name__ = "{m}" }
examples = [
    { id_suffix = "memory_total", query = "memory_total" },
]

[[query]]
id = "gauge_negative"
mode = "shadow"
promql = "temperature_offset"
fixture = "gauge_basic"
start = 0.0
end = 10.0
step = 1.0
description = "Gauge series that crosses zero (i64 column path)."
value_columns = ["v"]
label_columns = []
output_metric = { __name__ = "temperature_offset" }

[[query]]
id = "gauge_avg_over_time"
mode = "shadow"
promql = "avg_over_time(queue_depth[5m])"
fixture = "gauge_basic"
start = 0.0
end = 10.0
step = 1.0
description = "Time-aggregation function family — windowed mean of a gauge."
# 1Hz sampling → 300 rows ≈ 5 minutes. ROWS BETWEEN avoids the RANGE
# unit-mismatch problem (timestamps are ns, the [5m] window is seconds).
value_columns = ["v"]
label_columns = []
output_metric = { __name__ = "queue_depth" }

# ---------- Counters ----------

[[query]]
id = "counter_irate_basic"
mode = "shadow"
promql = "irate(requests[5m])"
fixture = "counter_basic"
start = 1.0
end = 10.0
step = 1.0
description = "Baseline irate — instantaneous rate from the last two samples in the window."
# Reads from the auto-generated `requests` view rather than the raw parquet so
# timestamps are snapped to the sampling-interval grid (matches the PromQL
# loader; otherwise real parquets with sub-second-offset capture timestamps
# diverge on the t-axis even when values agree). The view's `value` column is
# the canonical counter value for the metric.
# `irate_1s` is `c - LAG(c) OVER (...)`. The first row produces NULL (no LAG)
# which `QUALIFY v IS NOT NULL` filters, matching PromQL's `start = 1.0`
# (skipping t=0).
value_columns = ["v"]
label_columns = []
output_metric = { __name__ = "requests" }

[[query]]
id = "counter_rate_basic"
mode = "shadow"
promql = "rate(requests[5m])"
fixture = "counter_basic"
start = 1.0
end = 10.0
step = 1.0
description = "Baseline rate — average over the window."
# Reads from the `requests` view (snapped timestamps) — see counter_irate_basic
# for the rationale. Windowed monotonic rate: (current - first_in_window) /
# span_in_seconds. Correct for monotonic counters; for reset-prone counters
# use the CTE pattern in `counter_rate_reset`.
value_columns = ["v"]
label_columns = []
output_metric = { __name__ = "requests" }

[[query]]
id = "counter_irate_reset"
mode = "shadow"
promql = "irate(requests[5m])"
fixture = "counter_reset"
start = 1001.0
end = 1004.0
step = 1.0
description = "irate over a counter that resets at t=1003 — exercises reset semantics."
# Reads from the `requests` view (snapped timestamps) — see counter_irate_basic
# for the rationale. `irate_1s` is reset-aware (post-reset value as the
# increment).
value_columns = ["v"]
label_columns = []
output_metric = { __name__ = "requests" }

[[query]]
id = "counter_rate_reset"
mode = "shadow"
promql = "rate(requests[5m])"
fixture = "counter_reset"
start = 1001.0
end = 1004.0
step = 1.0
description = "rate over a counter that resets at t=1003 (post-reset value as increase)."
# Reset-aware rate: per-pair PromQL increments computed in a CTE (so the
# `LAG` isn't nested under another window function), then summed and
# normalised over a 5-minute row window. Equivalent to PromQL's reset-aware
# `rate()` semantics from `streaming/rate.rs:60-68`. Reads from the
# `requests` view (snapped timestamps) — see counter_irate_basic.
value_columns = ["v"]
label_columns = []
output_metric = { __name__ = "requests" }

