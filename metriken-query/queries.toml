[[query]]
id = "rezolus_cpu_busy_pct"
mode = "shadow"
promql = "sum(irate(cpu_usage[5m])) / 2 / 1000000000"
fixture = "rezolus_minimal"
start = 1.0
end = 20.0
step = 1.0
description = "Rezolus CPU busy-% pattern (cpu_cores=2 hard-coded for the fixture)."
sql = """
WITH per_series AS (
    SELECT timestamp, id, state,
           CASE
               WHEN LAG(value) OVER w IS NULL THEN NULL
               WHEN value >= LAG(value) OVER w
                   THEN CAST(value - LAG(value) OVER w AS DOUBLE)
               ELSE CAST(value AS DOUBLE)
           END AS rate
    FROM cpu_usage
    WINDOW w AS (PARTITION BY id, state ORDER BY timestamp)
)
SELECT CAST(timestamp AS DOUBLE) / 1e9 AS t,
       SUM(rate) / 2 / 1000000000 AS v
FROM per_series
WHERE rate IS NOT NULL
GROUP BY timestamp
ORDER BY timestamp
"""
value_columns = ["v"]
label_columns = []
output_metric = {}

