mode = "shadow"
# `sum(rate(${m:ident}[5m])) / ${d:number}` — total rate across all series
# divided by a scalar. Production: `sum(rate(gpu_energy_consumption[5m])) / 1000`.
# Uses the windowed reset-aware `rate()` pattern from `counter_rate_reset`,
# but generalised over the metric name.
promql = "sum(rate(${m:ident}[5m])) / ${d:number}"
fixture = "counter_basic"
start = 1.0
end = 10.0
step = 1.0
description = "Generic 5-minute windowed counter rate, summed across series, with scalar divisor."
sql = """
WITH incr AS (
    SELECT timestamp, col,
           CASE
               WHEN LAG(value) OVER w IS NULL THEN NULL
               WHEN value >= LAG(value) OVER w
                   THEN CAST(value - LAG(value) OVER w AS DOUBLE)
               ELSE CAST(value AS DOUBLE)
           END AS inc
    FROM {m}
    WINDOW w AS (PARTITION BY col ORDER BY timestamp)
),
windowed AS (
    SELECT timestamp,
           SUM(inc) OVER w_per_series
           / NULLIF(
               CAST(timestamp - FIRST_VALUE(timestamp) OVER w_per_series AS DOUBLE) / 1e9,
               0
           ) AS rate_per_series
    FROM incr
    WINDOW w_per_series AS (
        PARTITION BY col ORDER BY timestamp ROWS BETWEEN 300 PRECEDING AND CURRENT ROW
    )
)
SELECT CAST(timestamp AS DOUBLE) / 1e9 AS t,
       SUM(rate_per_series) / {d} AS v
FROM windowed
WHERE rate_per_series IS NOT NULL
GROUP BY timestamp
ORDER BY timestamp
"""
