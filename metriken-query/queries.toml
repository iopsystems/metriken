# ---------- Group J: Rezolus self-monitoring ----------
#
# BPF instrumentation overhead. Each is concrete because the formula is
# unique (no useful templating gain). See dashboard/rezolus.rs:39-55.

[[query]]
id = "rezolus_bpf_run_time_sec"
mode = "shadow"
promql = "sum(irate(rezolus_bpf_run_time[5m])) / 1000000000"
fixture = "rezolus_minimal"
start = 1.0
end = 20.0
step = 1.0
description = "Total BPF run time as a fraction of wall-clock (1e9 ns/s divisor)."
sql = """
WITH per_series AS (
    SELECT timestamp,
           CASE
               WHEN LAG(value) OVER w IS NULL THEN NULL
               WHEN value >= LAG(value) OVER w
                   THEN CAST(value - LAG(value) OVER w AS DOUBLE)
               ELSE CAST(value AS DOUBLE)
           END AS rate
    FROM rezolus_bpf_run_time
    WINDOW w AS (PARTITION BY col ORDER BY timestamp)
)
SELECT CAST(timestamp AS DOUBLE) / 1e9 AS t,
       SUM(rate) / 1000000000 AS v
FROM per_series
WHERE rate IS NOT NULL
GROUP BY timestamp
ORDER BY timestamp
"""
value_columns = ["v"]
label_columns = []
output_metric = {}

[[query]]
id = "rezolus_bpf_avg_run_time_per_sampler"
mode = "shadow"
promql = "(sum by (sampler) (irate(rezolus_bpf_run_time[5m])) / sum by (sampler) (irate(rezolus_bpf_run_count[5m]))) / 1000000000"
fixture = "rezolus_minimal"
start = 1.0
end = 20.0
step = 1.0
description = "Per-sampler average BPF call duration in seconds (run_time / run_count / 1e9)."
sql = """
WITH time_per_series AS (
    SELECT timestamp, sampler,
           CASE
               WHEN LAG(value) OVER w IS NULL THEN NULL
               WHEN value >= LAG(value) OVER w
                   THEN CAST(value - LAG(value) OVER w AS DOUBLE)
               ELSE CAST(value AS DOUBLE)
           END AS rate
    FROM rezolus_bpf_run_time
    WINDOW w AS (PARTITION BY col ORDER BY timestamp)
),
count_per_series AS (
    SELECT timestamp, sampler,
           CASE
               WHEN LAG(value) OVER w IS NULL THEN NULL
               WHEN value >= LAG(value) OVER w
                   THEN CAST(value - LAG(value) OVER w AS DOUBLE)
               ELSE CAST(value AS DOUBLE)
           END AS rate
    FROM rezolus_bpf_run_count
    WINDOW w AS (PARTITION BY col ORDER BY timestamp)
),
time_summed AS (
    SELECT timestamp, sampler, SUM(rate) AS time_sum
    FROM time_per_series WHERE rate IS NOT NULL
    GROUP BY sampler, timestamp
),
count_summed AS (
    SELECT timestamp, sampler, SUM(rate) AS count_sum
    FROM count_per_series WHERE rate IS NOT NULL
    GROUP BY sampler, timestamp
)
SELECT CAST(t.timestamp AS DOUBLE) / 1e9 AS t,
       (t.time_sum / NULLIF(c.count_sum, 0)) / 1000000000 AS v,
       t.sampler
FROM time_summed t
JOIN count_summed c
  ON t.timestamp = c.timestamp AND t.sampler = c.sampler
ORDER BY t.sampler, t.timestamp
"""
value_columns = ["v"]
label_columns = ["sampler"]
output_metric = {}

[[query]]
id = "rezolus_bpf_run_time_sec_per_sampler"
mode = "shadow"
promql = "sum by (sampler) (irate(rezolus_bpf_run_time[5m])) / 1000000000"
