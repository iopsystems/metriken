# ---------- Group D: IPNS chain ----------
#
# The longest concrete dashboard query. Computes instructions per nanosecond:
# `(instructions / cycles) * (tsc * aperf / mperf) / 1e9 / cpu_cores`.
# Aperf/mperf give the nominal-vs-running clock ratio so the IPC number
# scales by the actual frequency the cores ran at; dividing by tsc-derived
# wall time and cpu_cores normalises to per-ns-per-core.
#
# Concrete (not templated) because the operand list is fixed and there's no
# templating gain. Reuses the per-series rate pattern from
# `counter_ratio_generic`, but chained across five counters and joined to the
# `cpu_cores` gauge view at every tick.
[[query]]
id = "rezolus_cpu_ipns"
mode = "shadow"
promql = "sum(irate(cpu_instructions[5m])) / sum(irate(cpu_cycles[5m])) * sum(irate(cpu_tsc[5m])) * sum(irate(cpu_aperf[5m])) / sum(irate(cpu_mperf[5m])) / 1000000000 / cpu_cores"
fixture = "rezolus_minimal"
start = 1.0
end = 20.0
step = 1.0
description = "Rezolus CPU IPNS — instructions per nanosecond, the most-chained dashboard query."
value_columns = ["v"]
label_columns = []
output_metric = {}

