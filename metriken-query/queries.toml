# Canonical query catalogue and migration ledger for the metriken-query →
# DuckDB SQL migration.
#
# This file plays two roles. At test time it drives the golden-snapshot
# harness in `tests/golden.rs` (PromQL queries are run against fixtures and
# their output is checked against checked-in `insta` snapshots). At runtime
# it drives the dispatcher inside `QueryEngine::query_range`: incoming
# PromQL is matched against entries here and routed to PromQL, the SQL
# twin, or both, according to each entry's `mode`.
#
# Schema:
#   id           — unique slug, used as the snapshot file name
#   mode         — off | shadow | strict | primary (lifecycle, see below)
#   promql       — the PromQL query (literal for now; template captures TBD)
#   sql          — the DuckDB SQL twin; absent → mode forced to off
#   value_columns / label_columns — used to project SQL rows back into a
#                  QueryResult::Matrix shape. value_columns are the value
#                  fields per row (typically one); label_columns are the
#                  series-defining label columns (empty → single series).
#   fixture / start / end / step — used by the golden harness only;
#                  ignored by the runtime dispatcher.
#   description  — free text.
#
# `mode` lifecycle:
#   off     — PromQL only. Default for entries without a SQL twin or whose
#             SQL hasn't been validated yet.
#   shadow  — Run both engines on every request; compare; log/metricise
#             diffs; return PromQL's answer.
#   strict  — Run both; compare; diff = hard error; otherwise return either.
#   primary — Run SQL only.
#
# Promotions are catalogue commits — `git log -p queries.toml` is the
# canonical migration history.

# ---------- Gauges ----------

[[query]]
id = "gauge_bare"
mode = "shadow"
promql = "memory_total"
fixture = "gauge_basic"
start = 0.0
end = 10.0
step = 1.0
description = "Bare gauge selector — no rate function, just emit the points."
sql = """
SELECT CAST(timestamp AS DOUBLE) / 1e9 AS t,
       CAST(memory_total AS DOUBLE) AS v
FROM read_parquet('{fixture_path}')
WHERE memory_total IS NOT NULL
ORDER BY timestamp
"""
value_columns = ["v"]
label_columns = []
# Static labels added to every emitted series — mirrors PromQL's implicit
# `__name__` label on bare selectors.
output_metric = { __name__ = "memory_total" }

