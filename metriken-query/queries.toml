# ---------- Batch 9: gauge ratio with `ignoring(direction)` ----------
#
# `${a:ident}{${labels:labels}} / ignoring(${ig:ident}) ${b:ident}` covers
# `gpu_pcie_throughput{direction="receive"} / ignoring(direction) gpu_pcie_bandwidth`.
# PromQL's `ignoring(L)` matches LHS to RHS by label set after dropping the
# named labels — but metriken-query's `binary.rs::matrix_matrix_op` clones
# the LEFT series's full label set onto the output (see
# `out.push(LabeledSeries::new(left.labels, iter))`), so the resulting series
# *keeps* the `ignoring`-listed labels even though they didn't drive the
# match. Standard Prometheus drops them; we match metriken-query.
#
# SQL: NATURAL JOIN matches on the intersection of column names. The LHS
# view (gpu_pcie_throughput) carries `direction`; the RHS view
# (gpu_pcie_bandwidth) does not — the JOIN skips `direction` automatically
# because RHS has no such column to match against, and the LHS's `direction`
# value carries through to the output. Result: output carries LHS labels
# (including `{ig}`), mirroring metriken-query's "left-labels-on-output" rule.
# `{ig}` is captured for documentation but unused in the SQL — the JOIN
# behaviour does the right thing without explicit reference.
[[query]]
id = "gauge_ratio_with_labels_ignoring"
mode = "shadow"
promql = "${a:ident}{${labels:labels}} / ignoring(${ig:ident}) ${b:ident}"
fixture = "gpu_basic"
start = 0.0
end = 10.0
step = 1.0
description = "Gauge / gauge with `ignoring(label)` modifier — covers `gpu_pcie_throughput / ignoring(direction) gpu_pcie_bandwidth`."
#
# Strategy: KEEP `{ig}` on the LHS projection (so its value flows through to
# the output, matching metriken-query's "left labels on output" rule), and
# DROP `{ig}` from the RHS projection so the NATURAL JOIN doesn't constrain
# on it. `COLUMNS(c -> c NOT IN (...))` is used instead of `* EXCLUDE`
# because the RHS view may or may not have a `{ig}` column — vllm_gemma3 has
# bandwidth without `direction`, vllm has it. The lambda silently filters
# the intersection; EXCLUDE would error on the no-`direction` case.
value_columns = ["v"]
label_columns = []
output_metric = {}
examples = [
    { id_suffix = "gpu_pcie_throughput_receive_div_bandwidth", query = 'gpu_pcie_throughput{direction="receive"} / ignoring(direction) gpu_pcie_bandwidth' },
    { id_suffix = "gpu_pcie_throughput_transmit_div_bandwidth", query = 'gpu_pcie_throughput{direction="transmit"} / ignoring(direction) gpu_pcie_bandwidth' },
]

# ---------- Batch 10: nested gauge sums (memory used %) ----------

[[query]]
id = "gauge_a_over_a_plus_b"
mode = "shadow"
# Templated `sum(a{la}) / (sum(b{lb}) + sum(c{lc}))` — covers
# `gpu_memory_used / (gpu_memory_used + gpu_memory_free)` and similar
# fraction-of-total dashboards. Distinct capture names (`a`, `b`, `c`) since
# the template engine doesn't support back-references; in the production
# query all three identifiers happen to be the same metric (`gpu_memory`)
# but the SQL handles the three-way join symmetrically.
promql = "sum(${a:ident}{${la:labels}}) / (sum(${b:ident}{${lb:labels}}) + sum(${c:ident}{${lc:labels}}))"
fixture = "gauge_multi_source"
start = 0.0
end = 10.0
step = 1.0
description = "Three-way gauge fraction-of-total — `used / (used + free)` shape."
value_columns = ["v"]
label_columns = []
output_metric = {}
examples = [
    { id_suffix = "target_rate_cachecannon_over_combined", query = 'sum(target_rate{source="cachecannon"}) / (sum(target_rate{source="cachecannon"}) + sum(target_rate{source="valkey"}))' },
]

