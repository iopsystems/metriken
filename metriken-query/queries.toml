# ---------- Group I: GPU metrics ----------
#
# GPU dashboards mostly read gauges with a scalar divisor. Two shapes:
# `sum(${m:ident}) / ${d:number}` and `avg(${m:ident}) / ${d:number}`.
# A third for `rate(${m:ident}[5m])` (gpu_energy_consumption is a counter).

[[query]]
id = "gauge_sum_scaled"
mode = "shadow"
# `sum(${m:ident}) / ${d:number}` — sums a (possibly multi-series) gauge
# across labels at every timestamp, then divides by a scalar.
# Examples in production: `sum(gpu_power_usage) / 1000`,
# `sum(gpu_pcie_throughput{direction="rx"})` (with d=1).
promql = "sum(${m:ident}) / ${d:number}"
fixture = "gauge_basic"
start = 0.0
end = 10.0
step = 1.0
description = "Gauge cross-series sum with scalar divisor — common GPU/memory dashboard pattern."
sql = """
SELECT CAST(timestamp AS DOUBLE) / 1e9 AS t,
       SUM(CAST(value AS DOUBLE)) / {d} AS v
FROM {m}
WHERE value IS NOT NULL
GROUP BY timestamp
ORDER BY timestamp
"""
value_columns = ["v"]
label_columns = []
output_metric = {}
examples = [
    { id_suffix = "memory_total_div_1024", query = "sum(memory_total) / 1024" },
]

[[query]]
id = "gauge_avg_scaled"
mode = "shadow"
# `avg(${m:ident}) / ${d:number}` — multi-series gauge average with scalar
# divisor. Production example: `avg(gpu_memory_utilization) / 100`.
promql = "avg(${m:ident}) / ${d:number}"
fixture = "gauge_basic"
start = 0.0
end = 10.0
step = 1.0
description = "Gauge cross-series average with scalar divisor."
sql = """
SELECT CAST(timestamp AS DOUBLE) / 1e9 AS t,
