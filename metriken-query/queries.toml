# ---------- Batch 1c: bare rate (no sum) ----------

[[query]]
id = "counter_rate_bare_generic"
mode = "shadow"
# `rate(${m:ident}[${r:duration}])` — bare rate without aggregation.
# Production uses this for memory NUMA counters: `rate(memory_numa_local[5m])`.
# Reset semantics: post-reset value is the rate increment — same rule used by
# `counter_irate_basic` / `counter_total_sum_generic`.
promql = "rate(${m:ident}[${r:duration}])"
fixture = "counter_basic"
start = 1.0
end = 10.0
step = 1.0
description = "Bare counter rate without sum aggregator. Emits one series per source column."
# PromQL `rate(metric[Wm])` averages the per-second increment over the
# trailing W-second window, counting only pairs of samples that are *both*
# inside [t-W, t]. Naïve implementations use `ROWS BETWEEN W PRECEDING` and
# sum every increment in that window — but the first increment in the
# window references the row at t-(W+1), one step BEFORE the window. That
# overcounts by one inc and produces a small (~1/W) overshoot at every
# point, surfaced as a divergence on real data even though synthetic fixtures
# (where the data starts at row 0) hide it because inc[0] is NULL.
#
# Fix: subtract `FIRST_VALUE(inc)` to drop the pre-window pair. When the
# window includes row 0 (early data), inc[0] is NULL and `COALESCE(..., 0)`
# leaves the sum alone. The denominator's "first valid timestamp" picks the
# first in-window sample for early data and the second in-window sample
# (the partner of the dropped first inc) once the window is full.
value_columns = ["v"]
label_columns = []
# PromQL's `rate(metric[5m])` keeps the metric name on each output series,
# matching the existing `counter_rate_basic` literal entry's behavior.
output_metric = { __name__ = "{m}" }
examples = [
    { id_suffix = "requests", query = "rate(requests[5m])" },
]

