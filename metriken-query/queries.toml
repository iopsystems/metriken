examples = [
    { id_suffix = "memory_total_div_1", query = "avg(memory_total) / 1" },
]

[[query]]
id = "counter_rate_sum_scaled"
mode = "shadow"
# `sum(rate(${m:ident}[5m])) / ${d:number}` — total rate across all series
# divided by a scalar. Production: `sum(rate(gpu_energy_consumption[5m])) / 1000`.
# Uses the windowed reset-aware `rate()` pattern from `counter_rate_reset`,
# but generalised over the metric name.
promql = "sum(rate(${m:ident}[5m])) / ${d:number}"
fixture = "counter_basic"
start = 1.0
end = 10.0
step = 1.0
description = "Generic 5-minute windowed counter rate, summed across series, with scalar divisor."
sql = """
WITH incr AS (
    SELECT timestamp, col,
           CASE
               WHEN LAG(value) OVER w IS NULL THEN NULL
               WHEN value >= LAG(value) OVER w
                   THEN CAST(value - LAG(value) OVER w AS DOUBLE)
               ELSE CAST(value AS DOUBLE)
           END AS inc
    FROM {m}
    WINDOW w AS (PARTITION BY col ORDER BY timestamp)
),
windowed AS (
    SELECT timestamp,
           SUM(inc) OVER w_per_series
           / NULLIF(
               CAST(timestamp - FIRST_VALUE(timestamp) OVER w_per_series AS DOUBLE) / 1e9,
               0
           ) AS rate_per_series
    FROM incr
    WINDOW w_per_series AS (
        PARTITION BY col ORDER BY timestamp ROWS BETWEEN 300 PRECEDING AND CURRENT ROW
    )
)
SELECT CAST(timestamp AS DOUBLE) / 1e9 AS t,
       SUM(rate_per_series) / {d} AS v
FROM windowed
WHERE rate_per_series IS NOT NULL
GROUP BY timestamp
ORDER BY timestamp
"""
value_columns = ["v"]
label_columns = []
output_metric = {}
examples = [
    { id_suffix = "requests_div_1", query = "sum(rate(requests[5m])) / 1" },
]

# ---------- Group H: memory / NUMA gauge arithmetic ----------
#
# Gauge subtraction and ratio shapes for memory utilisation. JOIN the two
# views on timestamp, then evaluate the arithmetic. Both views are
# guaranteed to have aligned timestamps because the snap pass in
# `views::ensure_views` aligns every parquet timestamp to the sampling
# interval boundary.

[[query]]
id = "gauge_subtract"
mode = "shadow"
# `${a:ident} - ${b:ident}` — pointwise subtraction across two bare gauges.
# Production: `memory_total - memory_available`.
promql = "${a:ident} - ${b:ident}"
fixture = "gauge_basic"
start = 0.0
end = 10.0
step = 1.0
description = "Pointwise gauge subtraction. JOIN on timestamp, subtract."
sql = """
SELECT CAST(a.timestamp AS DOUBLE) / 1e9 AS t,
       (CAST(a.value AS DOUBLE) - CAST(b.value AS DOUBLE)) AS v
FROM {a} a
JOIN {b} b ON a.timestamp = b.timestamp
WHERE a.value IS NOT NULL AND b.value IS NOT NULL
ORDER BY a.timestamp
"""
value_columns = ["v"]
label_columns = []
output_metric = {}
examples = [
    { id_suffix = "memory_total_minus_queue_depth", query = "memory_total - queue_depth" },
]

# NOTE: `(${a:ident} - ${b:ident}) / ${a:ident}` (the production memory
# utilisation %) needs a back-reference capture (same `${a}` twice) which
# the current template engine doesn't support — duplicate names error at
# parse time. Tracking as a follow-up: either teach the engine to allow
# repeat captures with a value-equality requirement, or land a concrete
# `memory_util_pct` entry hardcoded to (memory_total, memory_available).
