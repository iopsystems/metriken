# Canonical query catalogue and migration ledger for the metriken-query →
# DuckDB SQL migration.
#
# This file plays two roles. At test time it drives the golden-snapshot
# harness in `tests/golden.rs` (PromQL queries are run against fixtures and
# their output is checked against checked-in `insta` snapshots). At runtime
# it drives the dispatcher inside `QueryEngine::query_range`: incoming
# PromQL is matched against entries here and routed to PromQL, the SQL
# twin, or both, according to each entry's `mode`.
#
# Schema:
#   id           — unique slug, used as the snapshot file name
#   mode         — off | shadow | strict | primary (lifecycle, see below)
#   promql       — the PromQL query (literal for now; template captures TBD)
#   sql          — the DuckDB SQL twin; absent → mode forced to off
#   value_columns / label_columns — used to project SQL rows back into a
#                  QueryResult::Matrix shape. value_columns are the value
#                  fields per row (typically one); label_columns are the
#                  series-defining label columns (empty → single series).
#   fixture / start / end / step — used by the golden harness only;
#                  ignored by the runtime dispatcher.
#   description  — free text.
#
# `mode` lifecycle:
#   off     — PromQL only. Default for entries without a SQL twin or whose
#             SQL hasn't been validated yet.
#   shadow  — Run both engines on every request; compare; log/metricise
#             diffs; return PromQL's answer.
#   strict  — Run both; compare; diff = hard error; otherwise return either.
#   primary — Run SQL only.
#
# Promotions are catalogue commits — `git log -p queries.toml` is the
# canonical migration history.
#
# ---------- SQL idioms used by templated entries ----------
#
# 1. Per-series rate via `PARTITION BY col`. Every metric view exposes a `col`
#    column carrying the physical parquet column name (one per labeled series),
#    so `LAG(value) OVER (PARTITION BY col ORDER BY timestamp)` walks within
#    a single series — no leakage across labels.
# 2. Multi-series histogram aggregation with `h2_combine(list(buckets))` per
#    timestamp, then `hist_irate_quantile`. Single-series metrics cost the
#    same as without the wrap — `h2_combine` of a 1-element list is a no-op.
# 3. Bare-counter `irate(${m:ident}[5m])` shape: union the per-series rates
#    and SUM. See `counter_total_sum` for the canonical pattern; Group K
#    singletons reuse it verbatim.
# 4. Gauge arithmetic: gauges have no rate, so the SQL is a `SELECT t, expr`
#    where `expr` does the arithmetic on the raw `value` column. For
#    multi-metric arithmetic, JOIN the views on `timestamp`.
# 5. Counter-with-source-label: same as `counter_total_sum` plus a
#    `WHERE source = {s}` (or `WHERE {labels:as_predicate}` for multi-label).

# ---------- Gauges ----------

[[query]]
id = "gauge_bare"
mode = "shadow"
# Templated bare-gauge selector — `${m:ident}` covers any gauge metric
# (memory_total, memory_available, memory_buffers, memory_cached, …).
# Projects every label column the metric view exposes (e.g. `source` on
# multi-source parquets like cachecannon's `0::memory_total` /
# `rezolus-client::memory_total`) via `* EXCLUDE`. The backend infers label
# names from the prepared-statement schema when `label_columns` is empty,
# so this one entry covers both labelless and labeled gauge shapes.
promql = "${m:ident}"
fixture = "gauge_basic"
start = 0.0
end = 10.0
step = 1.0
description = "Bare gauge selector — no rate function, just emit the points. One templated entry covers every gauge metric."
sql = """
SELECT CAST(timestamp AS DOUBLE) / 1e9 AS t,
       CAST(value AS DOUBLE) AS v,
       * EXCLUDE (timestamp, value, col)
FROM {m}
WHERE value IS NOT NULL
ORDER BY timestamp
"""
value_columns = ["v"]
label_columns = []
# Static labels added to every emitted series — mirrors PromQL's implicit
# `__name__` label on bare selectors.
output_metric = { __name__ = "{m}" }
examples = [
    { id_suffix = "memory_total", query = "memory_total" },
]

