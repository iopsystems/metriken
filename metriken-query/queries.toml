# views on timestamp, then evaluate the arithmetic. Both views are
# guaranteed to have aligned timestamps because the snap pass in
# `views::ensure_views` aligns every parquet timestamp to the sampling
# interval boundary.

[[query]]
id = "gauge_subtract"
mode = "shadow"
# `${a:ident} - ${b:ident}` — pointwise subtraction across two bare gauges.
# Production: `memory_total - memory_available`.
