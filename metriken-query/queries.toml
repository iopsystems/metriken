# generalised over the metric name and divisor.

[[query]]
id = "counter_irate_by_id_scaled"
mode = "shadow"
promql = "sum by (id) (irate(${m:ident}[5m])) / ${d:number}"
fixture = "rezolus_minimal"
start = 1.0
end = 20.0
step = 1.0
description = "Per-id rate of a counter metric, normalised by a scalar — one entry covers every per-CPU usage variant."
sql = """
WITH per_series AS (
    SELECT timestamp, id,
           CASE
               WHEN LAG(value) OVER w IS NULL THEN NULL
               WHEN value >= LAG(value) OVER w
                   THEN CAST(value - LAG(value) OVER w AS DOUBLE)
               ELSE CAST(value AS DOUBLE)
           END AS rate
    FROM {m}
    WINDOW w AS (PARTITION BY col ORDER BY timestamp)
)
SELECT CAST(timestamp AS DOUBLE) / 1e9 AS t,
       SUM(rate) / {d} AS v,
       id
FROM per_series
WHERE rate IS NOT NULL
GROUP BY id, timestamp
ORDER BY id, timestamp
"""
value_columns = ["v"]
label_columns = ["id"]
output_metric = {}
examples = [
    { id_suffix = "cpu_usage_div_1e9", query = "sum by (id) (irate(cpu_usage[5m])) / 1000000000" },
]

# ---------- Group B: labels-filtered counter rate aggregations ----------
#
# `sum(irate(${m:ident}{${labels:labels}}[${r:duration}]))` — generic
# total-rate aggregation across any (metric, label-predicate, range)
# combination. Subsumes `softirq_irate_total_by_kind` (when that entry is
# eventually retired) and covers the bulk of Group B/C dashboard shapes
# (service throughput, cache/db throughput).
#
# `{labels:as_predicate}` emits a SQL WHERE-fragment for the captured matchers
# (e.g. `kind = 'hi' AND state != 'idle'`). The duration `${r:duration}` is
# captured but not used in the SQL — irate's "5m lookback" only matters when
# the parquet has gaps; the LAG-based per-tick delta is the same regardless.

[[query]]
id = "counter_irate_sum_with_labels"
mode = "shadow"
promql = 'sum(irate(${m:ident}{${labels:labels}}[${r:duration}]))'
fixture = "softirq_multi_kind"
start = 1.0
end = 10.0
step = 1.0
description = "Generic labels-filtered counter rate aggregation. Covers Group B / C service-throughput dashboards."
sql = """
WITH per_series AS (
    SELECT timestamp,
           CASE
               WHEN LAG(value) OVER w IS NULL THEN NULL
               WHEN value >= LAG(value) OVER w
                   THEN CAST(value - LAG(value) OVER w AS DOUBLE)
               ELSE CAST(value AS DOUBLE)
           END AS rate
    FROM {m}
    WHERE {labels:as_predicate}
    WINDOW w AS (PARTITION BY col ORDER BY timestamp)
)
SELECT CAST(timestamp AS DOUBLE) / 1e9 AS t,
       SUM(rate) AS v
FROM per_series
WHERE rate IS NOT NULL
GROUP BY timestamp
ORDER BY timestamp
"""
value_columns = ["v"]
label_columns = []
output_metric = {}
examples = [
    { id_suffix = "softirq_kind_hi_5m", query = 'sum(irate(softirq{kind="hi"}[5m]))' },
]

