[package]
name = "metriken-query"
version = "0.7.0"
edition = "2021"
authors = [
    "Brian Martin <brian@iop.systems>",
]
license = "MIT OR Apache-2.0"
description = "PromQL query engine and TSDB for metriken parquet files"
homepage = "https://github.com/iopsystems/metriken"
repository = "https://github.com/iopsystems/metriken"

[dependencies]
arrow = "56.1.0"
bytes = "1"
histogram = { path = "../../histogram" }
metriken-exposition = { version = "0.14.0", path = "../metriken-exposition", default-features = false, optional = true }
parquet = { version = "56.1.0", default-features = false, features = ["arrow", "snap", "brotli", "flate2", "flate2-rust_backened", "zstd"] }
promql-parser = "0.4"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
thiserror = "2"

# Optional HTTP API dependencies
axum = { version = "0.8", optional = true }

[dev-dependencies]
tempfile = "3"

[features]
default = ["ingest", "lz4"]
ingest = ["metriken-exposition"]
lz4 = ["parquet/lz4"]
http = ["axum"]
